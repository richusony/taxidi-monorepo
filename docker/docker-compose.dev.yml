services:
  db:
    ports:
      - '5432:5432'
      - '51212:51212'
    volumes:
      - postgres_data:/var/lib/postgresql/data

    env_file: ../.env.local

  pgbouncer:
    depends_on:
      - db
    ports:
      - '6432:5432'
    env_file: ../.env.local


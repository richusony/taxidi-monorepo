services:
  db:
    container_name: taxidi-db
    image: postgres:17
    ports:
      - '5432:5432'
      - '51212:51212'
    volumes:
      - postgres_data:/var/lib/postgresql/data

    env_file: ../.env

  pgbouncer:
    container_name: taxidi-pgbouncer
    image: edoburu/pgbouncer
    restart: always
    depends_on:
      - db
    ports:
      - '6432:6432'
    env_file: ../.env

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    depends_on:
      - pgbouncer
    expose:
      - 8080

  nginx:
    container_name: taxidi-proxy
    image: nginx:alpine
    depends_on:
      - api
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
